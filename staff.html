<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff Portal - ISP Billing System</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="topbar">
    <div class="container">
      <div>
        <div class="topbar-title">Staff Portal</div>
        <div id="welcomeText" class="muted" style="color:#d1d5db;"></div>
      </div>
      <div class="topbar-right">
        <button id="logoutBtn" class="btn-light">Logout</button>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="card">
      <div class="toolbar">
        <h2 style="margin:0;">Subscriber Lookup</h2>
        <input type="text" id="searchInput" placeholder="Search subscriber..." />
      </div>

      <div id="pageMessage" class="message"></div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Account No</th>
              <th>Full Name</th>
              <th>Plan</th>
              <th>Monthly Fee</th>
              <th>Status</th>
              <th>Contact</th>
              <th>Assigned IP</th>
              <th>MAC Address</th>
              <th>OLT Port</th>
              <th>ONU Serial</th>
            </tr>
          </thead>
          <tbody id="subscriberTableBody">
            <tr>
              <td colspan="10" class="empty-cell">Loading...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="assets/config.js"></script>
  <script src="js/common.js"></script>
  <script src="js/staff.js"></script>
</body>
</html>
